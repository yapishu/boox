<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Shared Collection - Boox</title>
  <link rel="icon" type="image/svg+xml" href="/apps/boox/icon.svg">
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Hanken Grotesk', -apple-system, system-ui, sans-serif;
      background: #0F0F0F; color: #E8E8E6;
      min-height: 100vh; padding: 2rem 1.5rem;
      -webkit-font-smoothing: antialiased; font-size: 15px; line-height: 1.5;
    }
    .wrap { max-width: 900px; margin: 0 auto; }
    .ship { color: #5A5A58; font-size: 0.8rem; font-family: monospace; margin-bottom: 0.25rem; }
    h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 0.25rem; letter-spacing: -0.02em; }
    .desc { color: #8A8A87; margin-bottom: 2rem; font-size: 0.9rem; }
    .grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 1.25rem;
    }
    .card { cursor: default; transition: transform 150ms ease; }
    .card:hover { transform: translateY(-2px); }
    .cover {
      aspect-ratio: 2/3; background: #1E1E1C; border-radius: 8px;
      overflow: hidden; position: relative; border: 1px solid #2A2A28; margin-bottom: 0.5rem;
    }
    .cover img { width: 100%; height: 100%; object-fit: cover; }
    .cover-placeholder {
      display: flex; align-items: center; justify-content: center;
      height: 100%; padding: 0.75rem; text-align: center;
      font-size: 0.8rem; font-weight: 600; color: #E8E8E6; line-height: 1.3;
    }
    .badge {
      position: absolute; bottom: 0.4rem; right: 0.4rem;
      background: rgba(0,0,0,0.6); color: #fff; padding: 0.15rem 0.45rem;
      border-radius: 999px; font-size: 0.6rem; font-weight: 600;
      text-transform: uppercase; backdrop-filter: blur(4px);
    }
    .meta { padding: 0 0.1rem; }
    .title {
      font-size: 0.8rem; font-weight: 600; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis; margin-bottom: 0.1rem;
    }
    .author { font-size: 0.7rem; color: #8A8A87; }
    .loading { text-align: center; padding: 4rem; color: #8A8A87; }
    .error { text-align: center; padding: 4rem; color: #ef4444; }
    .powered {
      margin-top: 3rem; text-align: center; font-size: 0.7rem; color: #5A5A58;
      border-top: 1px solid #2A2A28; padding-top: 1.5rem;
    }
    .powered a { color: #8A8A87; text-decoration: none; }
    .powered a:hover { color: #E8E8E6; }
    .import-hint {
      background: #1A1A18; border: 1px solid #2A2A28; border-radius: 8px;
      padding: 1rem; margin-bottom: 2rem; font-size: 0.85rem; color: #8A8A87;
    }
    .import-hint code {
      background: #2A2A28; padding: 0.15rem 0.4rem; border-radius: 4px;
      font-size: 0.8em; color: #E8E8E6;
    }
  </style>
</head>
<body>
  <div class="wrap" id="app">
    <div class="loading">Loading collection...</div>
  </div>
  <script>
    (function() {
      const params = new URLSearchParams(window.location.search);
      const token = params.get('token');
      const app = document.getElementById('app');

      if (!token) {
        app.innerHTML = '<div class="error">No collection token provided.</div>';
        return;
      }

      fetch('/apps/boox/api/public/' + encodeURIComponent(token))
        .then(r => {
          if (!r.ok) throw new Error('Collection not found');
          return r.json();
        })
        .then(data => {
          document.title = data.name + ' - Boox';
          let html = '';
          html += '<div class="ship">' + esc(data.ship) + '</div>';
          html += '<h1>' + esc(data.name) + '</h1>';
          if (data.description) html += '<p class="desc">' + esc(data.description) + '</p>';
          html += '<div class="import-hint">This collection has <strong>' + data.books.length + '</strong> book' + (data.books.length !== 1 ? 's' : '') + '. If you have Boox installed on your Urbit ship, you can browse and import these from the <strong>Collections</strong> tab.</div>';
          html += '<div class="grid">';
          data.books.forEach(function(book) {
            html += '<div class="card">';
            html += '<div class="cover">';
            if (book['cover-url']) {
              html += '<img src="' + esc(book['cover-url']) + '" alt="" loading="lazy">';
            } else {
              html += '<div class="cover-placeholder">' + esc(book.title).slice(0, 40) + '</div>';
            }
            html += '<span class="badge">' + esc(book.format) + '</span>';
            html += '</div>';
            html += '<div class="meta">';
            html += '<div class="title">' + esc(book.title) + '</div>';
            html += '<div class="author">' + esc(book.author || 'Unknown') + '</div>';
            html += '</div></div>';
          });
          html += '</div>';
          html += '<div class="powered">Shared via <a href="https://urbit.org">Urbit</a> / Boox</div>';
          app.innerHTML = html;
        })
        .catch(function(e) {
          app.innerHTML = '<div class="error">' + esc(e.message) + '</div>';
        });

      function esc(s) {
        if (!s) return '';
        var d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
      }
    })();
  </script>
</body>
</html>
